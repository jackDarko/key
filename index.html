<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propuesta</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f50b32, #960303);
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      margin-bottom: 20px;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin-bottom: 25px;
    }

    .buttons {
      position: relative;
      width: 420px;
      height: 180px;
      margin: auto;
    }

    button {
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 20px;
      transition: 0.3s;
    }

    #yes {
      background: #2ecc71;
      color: black;
      position: absolute;
      left: 60px;
      top: 40px;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background: #e74c3c;
      color: white;
      position: absolute;
      left: 240px;
      top: 40px;
    }

    .hidden {
      display: none !important;
    }

    #success {
      position: fixed;
      inset: 0;
      background: white;
      color: #ff4d6d;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      animation: zoom 0.8s ease;
      z-index: 10;
    }

    #success.show {
      display: flex;
    }

    @keyframes zoom {
      from {
        transform: scale(0);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .heart {
      position: fixed;
      color: red;
      font-size: 30px;
      pointer-events: none;
      animation: float 4s linear forwards;
      z-index: 20;
    }

    @keyframes float {
      from {
        transform: translateY(0) scale(0);
        opacity: 1;
      }

      to {
        transform: translateY(-800px) scale(2);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="container" id="main">
    <h1>💖 ¿keyyy me darias el chiquito y venirme adentro tambien? 💖</h1>

    <img src="https://media.tenor.com/0AVbKGY_MxMAAAAC/love.gif" alt="love">

    <div class="buttons" id="buttonArea">
      <button id="yes">💖 Sí 💖</button>
      <button id="no">😅 No</button>
    </div>
  </div>

  <div id="success" class="hidden">
    <h1>🥰 Sabía que dirías que SÍ, si no te iba a matar ❤️</h1>
    <h2>¡Ahora prepárate para nuestra cita! 🌹</h2>
  </div>

  <script>
    const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const main = document.getElementById("main");
const success = document.getElementById("success");

document.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();

    const btnCenterX = rect.left + rect.width / 2;
    const btnCenterY = rect.top + rect.height / 2;

    const distance = Math.hypot(
        e.clientX - btnCenterX,
        e.clientY - btnCenterY
    );

    // Cuando el mouse está cerca...
    if (distance < 180) {

        let x, y;

        do {

            x = Math.random() * (window.innerWidth - rect.width);
            y = Math.random() * (window.innerHeight - rect.height);

        } while (

            Math.hypot(
                e.clientX - x,
                e.clientY - y
            ) < 250

        );

        noBtn.style.position = "fixed";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

});

yesBtn.addEventListener("click", () => {

    main.style.display = "none";

    success.classList.remove("hidden");
    success.classList.add("show");

    createHearts();

});

function createHearts() {

    setInterval(() => {

        const heart = document.createElement("div");

        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";
        heart.style.fontSize = (20 + Math.random() * 40) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);

    }, 150);

}
  </script>

</body>
</html>
